name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Restore solution
        run: dotnet restore OpenVideoToolbox.sln

      - name: Build solution
        run: dotnet build OpenVideoToolbox.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OpenVideoToolbox.sln --configuration Release --no-build

      - name: Verify example plugin flow
        shell: powershell
        run: ./scripts/Verify-ExamplePlugin.ps1 -NoBuild $true
