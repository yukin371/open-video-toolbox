name: runtime-baseline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  observe-runtime-baseline:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install ffmpeg
        shell: powershell
        run: choco install ffmpeg -y

      - name: Restore solution
        run: dotnet restore OpenVideoToolbox.sln

      - name: Build solution
        run: dotnet build OpenVideoToolbox.sln --no-restore

      - name: Create artifact directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path .artifacts | Out-Null

      - name: Observe runtime baseline
        shell: powershell
        run: ./scripts/Measure-RuntimeBaseline.ps1 -OutputJsonPath .artifacts/runtime-baseline.json

      - name: Verify dependency baseline
        shell: powershell
        run: ./scripts/Verify-DependencyBaseline.ps1 -OutputJsonPath .artifacts/dependency-baseline.json -NoBuild:$true

      - name: Check runtime thresholds
        shell: powershell
        run: ./scripts/Test-RuntimeBaselineThresholds.ps1 -RuntimeBaselinePath .artifacts/runtime-baseline.json -OutputJsonPath .artifacts/runtime-threshold-check.json -FailOnExceeded

      - name: Write workflow summary
        shell: powershell
        run: ./scripts/Write-RuntimeBaselineSummary.ps1 -RuntimeBaselinePath .artifacts/runtime-baseline.json -DependencyBaselinePath .artifacts/dependency-baseline.json -ThresholdCheckPath .artifacts/runtime-threshold-check.json -SummaryPath .artifacts/runtime-baseline-summary.md

      - name: Upload runtime baseline artifacts
        uses: actions/upload-artifact@v7
        with:
          name: runtime-baseline
          path: |
            .artifacts/*.json
            .artifacts/*.md
          include-hidden-files: true
          retention-days: 14
