name: release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - rid: win-x64
            archive_ext: zip
            portable_asset_source: ovt.exe
            portable_asset_name: ovt-win-x64.exe
          - rid: linux-x64
            archive_ext: tar.gz
            portable_asset_source: ""
            portable_asset_name: ""
          - rid: osx-x64
            archive_ext: tar.gz
            portable_asset_source: ""
            portable_asset_name: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: |
          dotnet publish src/OpenVideoToolbox.Cli \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o publish/${{ matrix.rid }}

      - name: Create archive
        run: |
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            cd publish/${{ matrix.rid }}
            zip -qr ../../ovt-${{ matrix.rid }}.zip .
          else
            cd publish/${{ matrix.rid }}
            tar czf ../../ovt-${{ matrix.rid }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovt-${{ matrix.rid }}
          path: ovt-${{ matrix.rid }}.${{ matrix.archive_ext }}

      - name: Prepare portable executable
        if: ${{ matrix.portable_asset_source != '' }}
        run: |
          cp publish/${{ matrix.rid }}/${{ matrix.portable_asset_source }} ${{ matrix.portable_asset_name }}

      - name: Upload portable executable
        if: ${{ matrix.portable_asset_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ovt-${{ matrix.rid }}-portable
          path: ${{ matrix.portable_asset_name }}

  create-release:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/ovt-*
